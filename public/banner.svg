<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07080d"/>
      <stop offset="100%" style="stop-color:#0f1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f6ef7"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f6ef7;stop-opacity:0.15"/>
      <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#4f6ef7;stop-opacity:0.15"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="softblur">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="60" x2="1200" y2="60" stroke="#1e2233" stroke-width="0.5"/>
  <line x1="0" y1="120" x2="1200" y2="120" stroke="#1e2233" stroke-width="0.5"/>
  <line x1="0" y1="180" x2="1200" y2="180" stroke="#1e2233" stroke-width="0.5"/>
  <line x1="0" y1="240" x2="1200" y2="240" stroke="#1e2233" stroke-width="0.5"/>

  <!-- Grid lines vertical -->
  <line x1="150" y1="0" x2="150" y2="300" stroke="#1e2233" stroke-width="0.5"/>
  <line x1="300" y1="0" x2="300" y2="300" stroke="#1e2233" stroke-width="0.5"/>
  <line x1="450" y1="0" x2="450" y2="300" stroke="#1e2233" stroke-width="0.5"/>
  <line x1="600" y1="0" x2="600" y2="300" stroke="#1e2233" stroke-width="0.5"/>
  <line x1="750" y1="0" x2="750" y2="300" stroke="#1e2233" stroke-width="0.5"/>
  <line x1="900" y1="0" x2="900" y2="300" stroke="#1e2233" stroke-width="0.5"/>
  <line x1="1050" y1="0" x2="1050" y2="300" stroke="#1e2233" stroke-width="0.5"/>

  <!-- Glow blob center -->
  <ellipse cx="600" cy="150" rx="380" ry="130" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)"/>

  <!-- Left decorative dots -->
  <circle cx="60" cy="80" r="2" fill="#4f6ef7" opacity="0.6"/>
  <circle cx="80" cy="120" r="1.5" fill="#7c3aed" opacity="0.5"/>
  <circle cx="40" cy="160" r="1" fill="#4f6ef7" opacity="0.4"/>
  <circle cx="100" cy="200" r="2" fill="#7c3aed" opacity="0.5"/>
  <circle cx="55" cy="230" r="1.5" fill="#4f6ef7" opacity="0.3"/>

  <!-- Right decorative dots -->
  <circle cx="1140" cy="80" r="2" fill="#4f6ef7" opacity="0.6"/>
  <circle cx="1120" cy="130" r="1.5" fill="#7c3aed" opacity="0.5"/>
  <circle cx="1160" cy="170" r="1" fill="#4f6ef7" opacity="0.4"/>
  <circle cx="1100" cy="210" r="2" fill="#7c3aed" opacity="0.5"/>
  <circle cx="1145" cy="240" r="1.5" fill="#4f6ef7" opacity="0.3"/>

  <!-- Decorative left pulse line -->
  <polyline points="30,150 55,130 75,155 95,125 115,145 135,140" stroke="#4f6ef7" stroke-width="1.5" fill="none" opacity="0.4"/>

  <!-- Decorative right pulse line -->
  <polyline points="1170,150 1145,130 1125,155 1105,125 1085,145 1065,140" stroke="#7c3aed" stroke-width="1.5" fill="none" opacity="0.4"/>

  <!-- Main logo / bolt icon area -->
  <text x="600" y="108" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#4f6ef7" text-anchor="middle" letter-spacing="8" opacity="0.9">⚡ NEXUS PRIME</text>

  <!-- Main title -->
  <text x="600" y="175" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="#dde1f0" text-anchor="middle" letter-spacing="-1">Intelligence Dashboard</text>

  <!-- Subtitle -->
  <text x="600" y="218" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#6875a0" text-anchor="middle" letter-spacing="0.5">Crypto · Geopolitical · Cyber · IoT · AI Agent · 12 Live Tabs</text>

  <!-- Pill tags row -->
  <!-- Next.js pill -->
  <rect x="314" y="244" width="80" height="24" rx="12" fill="#151820" stroke="#1e2233" stroke-width="1"/>
  <text x="354" y="260" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#dde1f0" text-anchor="middle" opacity="0.8">Next.js 14</text>

  <!-- TypeScript pill -->
  <rect x="404" y="244" width="88" height="24" rx="12" fill="#151820" stroke="#3178c6" stroke-width="1"/>
  <text x="448" y="260" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#3178c6" text-anchor="middle">TypeScript</text>

  <!-- Claude pill -->
  <rect x="502" y="244" width="80" height="24" rx="12" fill="#151820" stroke="#d97706" stroke-width="1"/>
  <text x="542" y="260" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#d97706" text-anchor="middle">Claude AI</text>

  <!-- Zustand pill -->
  <rect x="592" y="244" width="76" height="24" rx="12" fill="#151820" stroke="#1e2233" stroke-width="1"/>
  <text x="630" y="260" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#6875a0" text-anchor="middle">Zustand</text>

  <!-- Tailwind pill -->
  <rect x="678" y="244" width="80" height="24" rx="12" fill="#151820" stroke="#06b6d4" stroke-width="1"/>
  <text x="718" y="260" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#06b6d4" text-anchor="middle">Tailwind</text>

  <!-- Ollama pill -->
  <rect x="768" y="244" width="70" height="24" rx="12" fill="#151820" stroke="#10b981" stroke-width="1"/>
  <text x="803" y="260" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#10b981" text-anchor="middle">Ollama</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="297" width="1200" height="3" fill="url(#accent)" opacity="0.4"/>
</svg>
